<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickFolder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="titlebar" id="drag-region"></div>

  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-row">
        <div class="header-title">
          <span class="app-name">QuickFolder</span>
          <span class="app-desc">폴더를 한 곳에서 관리</span>
          <span class="app-version" id="app-version"></span>
        </div>
        <div class="header-actions">
          <button class="btn-icon btn-sm" id="btn-github" title="GitHub Star">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/>
            </svg>
          </button>
          <button class="btn-icon btn-sm" id="btn-settings" title="자동화 권한 설정">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
          </button>
          <button class="btn-icon btn-sm" id="btn-pin" title="고정 (마우스 이탈 시 안 닫힘)">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" class="pin-icon">
              <path d="M4.456.734a1.75 1.75 0 012.826.504l.613 1.327a3.08 3.08 0 002.084 1.707l2.454.584c1.332.317 1.8 1.972.832 2.94L11.06 10l3.72 3.72a.75.75 0 11-1.06 1.06L10 11.06l-2.204 2.205c-.968.968-2.623.5-2.94-.832l-.584-2.454a3.08 3.08 0 00-1.707-2.084l-1.327-.613a1.75 1.75 0 01-.504-2.826L4.456.734z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Workspace Tabs -->
    <div class="workspace-bar">
      <div class="workspace-tabs" id="workspace-tabs"></div>
      <button class="btn-icon" id="add-workspace" title="새 워크스페이스">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/>
      </svg>
      <input type="text" id="search-input" placeholder="폴더 검색..." spellcheck="false">
      <button class="search-clear" id="search-clear" style="display:none" title="초기화">&times;</button>
      <span class="search-hint" id="search-hint"></span>
    </div>

    <!-- Folder List -->
    <div class="folder-list" id="folder-list"></div>

    <!-- Search Results -->
    <div class="search-results" id="search-results" style="display:none"></div>

    <!-- Workspace Edit Modal -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <h3 id="modal-title">워크스페이스 이름</h3>
        <input type="text" id="modal-input" placeholder="워크스페이스 이름" maxlength="20">
        <div class="modal-actions">
          <button class="btn-secondary" id="modal-cancel">취소</button>
          <button class="btn-primary" id="modal-confirm">확인</button>
        </div>
      </div>
    </div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
